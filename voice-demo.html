<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex — RK Royal Engineers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0f;
      --surface: #14141a;
      --surface-raised: #1a1a22;
      --border: #1e1e28;
      --border-light: #2a2a36;
      --text: #e8e8ed;
      --text-muted: #7a7a8a;
      --text-dim: #4a4a58;
      --accent: #6366f1;
      --accent-bg: rgba(99,102,241,0.1);
      --success: #22c55e;
      --success-bg: rgba(34,197,94,0.08);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 460px;
      padding: 28px;
    }
    .header {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }
    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: var(--font-mono);
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      margin-bottom: 20px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all .3s;
    }
    .status-dot.ready { background: var(--success); box-shadow: 0 0 8px rgba(34,197,94,0.3); }
    .status-dot.recording { background: #ef4444; animation: pulse 1s infinite; }
    .status-dot.processing { background: #f59e0b; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }
    .status-text { font-size: 12px; color: var(--text-muted); flex: 1; font-family: var(--font-mono); letter-spacing: .02em; }
    .status-time { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }

    .mic-area {
      text-align: center;
      margin-bottom: 24px;
    }
    .mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      cursor: pointer;
      transition: all .25s;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
    }
    .mic-btn.idle {
      background: var(--surface);
      color: var(--text-muted);
    }
    .mic-btn.idle:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }
    .mic-btn.recording {
      background: rgba(239,68,68,0.15);
      border-color: #ef4444;
      color: #ef4444;
    }
    .mic-btn.processing {
      background: rgba(245,158,11,0.15);
      border-color: #f59e0b;
      color: #f59e0b;
      cursor: wait;
    }
    .mic-icon { font-size: 22px; line-height: 1; }
    .mic-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }

    .chat-area {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      min-height: 180px;
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
    .msg { margin-bottom: 12px; display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.bot { justify-content: flex-start; }
    .msg-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.55;
    }
    .msg.user .msg-bubble {
      background: var(--accent-bg);
      border: 1px solid rgba(99,102,241,0.2);
      border-bottom-right-radius: 2px;
      color: var(--text);
    }
    .msg.bot .msg-bubble {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
      color: var(--text);
    }

    .booking-card {
      background: var(--success-bg);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: var(--radius);
      padding: 14px;
      display: none;
      margin-bottom: 12px;
    }
    .booking-card h3 { font-size: 11px; color: var(--success); margin-bottom: 8px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .06em; }
    .booking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px; }
    .booking-item { font-size: 12px; display: flex; gap: 6px; font-family: var(--font-mono); }
    .booking-item .label { color: var(--text-dim); min-width: 40px; }
    .booking-item .value { color: var(--text); }

    .debug-bar { font-size: 10px; color: var(--text-dim); text-align: center; margin-top: 6px; font-family: var(--font-mono); }

    .footer { text-align: center; margin-top: 20px; font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
    .footer span { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-text">
        <h1>Alex</h1>
        <p>RK Royal Engineers · Hyderabad</p>
      </div>
    </div>

    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Ready</div>
      <div class="status-time" id="statusTime"></div>
    </div>

    <div class="mic-area">
      <button class="mic-btn idle" id="micBtn">
        <span class="mic-icon">🎤</span>
        <span class="mic-label">Talk</span>
      </button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="msg bot">
        <div class="msg-bubble">Good morning! This is Alex from RK Royal Engineers. How may I assist you today?</div>
      </div>
    </div>

    <div class="booking-card" id="bookingCard">
      <h3>Test Ride Booked</h3>
      <div class="booking-grid">
        <div class="booking-item"><span class="label">REF</span><span class="value" id="bRef">—</span></div>
        <div class="booking-item"><span class="label">NAME</span><span class="value" id="bName">—</span></div>
        <div class="booking-item"><span class="label">MODEL</span><span class="value" id="bModel">—</span></div>
        <div class="booking-item"><span class="label">DATE</span><span class="value" id="bDate">—</span></div>
        <div class="booking-item"><span class="label">TIME</span><span class="value" id="bTime">—</span></div>
      </div>
    </div>

    <div class="debug-bar" id="debugInfo"></div>
    <div class="footer">whisper.cpp · Big Pickle</div>
  </div>

  <script>
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusTime = document.getElementById('statusTime');
    const chatArea = document.getElementById('chatArea');
    const debugInfo = document.getElementById('debugInfo');
    const bookingCard = document.getElementById('bookingCard');

    let sessionId = localStorage.getItem('sessionId');
    if (!sessionId) {
      sessionId = 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem('sessionId', sessionId);
    }

    let audioCtx = null, stream = null, source = null, processor = null;
    let pcmChunks = [], recording = false, pressTimer = 0;
    let walkieMode = false;
    let endingWalkie = false;
    let holdTimer = null;

    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      div.appendChild(bubble);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function startRecording() {
      if (endingWalkie) return;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext({ sampleRate: 16000 });
        source = audioCtx.createMediaStreamSource(stream);
        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        pcmChunks = [];
        recording = true;
        source.connect(processor);
        processor.connect(audioCtx.destination);
        processor.onaudioprocess = (e) => {
          if (!recording) return;
          const input = e.inputBuffer.getChannelData(0);
          const pcm = new Int16Array(input.length);
          for (let i = 0; i < input.length; i++) {
            const s = Math.max(-1, Math.min(1, input[i]));
            pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          pcmChunks.push(pcm);
        };
        micBtn.className = 'mic-btn recording';
        micBtn.innerHTML = '<span class="mic-icon">🔴</span><span class="mic-label">Release to send</span>';
        setStatus('recording', 'Recording...');
        pressTimer = Date.now();
      } catch (err) {
        setStatus('ready', 'Mic error: ' + err.message);
      }
    }

    function stopRecording() {
      if (!recording) return;
      recording = false;
      const elapsed = (Date.now() - pressTimer) / 1000;
      if (elapsed < 1) {
        refreshUI();
        cleanup();
        return;
      }

      const totalLen = pcmChunks.reduce((s, c) => s + c.length, 0);
      const pcmBuf = new Int16Array(totalLen);
      let offset = 0;
      for (const chunk of pcmChunks) { pcmBuf.set(chunk, offset); offset += chunk.length; }

      const sr = 16000, dataSize = pcmBuf.length * 2;
      const wav = new ArrayBuffer(44 + dataSize);
      const view = new DataView(wav);
      function writeString(off, str) { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); }
      writeString(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeString(8, 'WAVE');
      writeString(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
      view.setUint16(22, 1, true); view.setUint32(24, sr, true); view.setUint32(28, sr * 2, true);
      view.setUint16(32, 2, true); view.setUint16(34, 16, true);
      writeString(36, 'data'); view.setUint32(40, dataSize, true);
      new Int16Array(wav, 44).set(pcmBuf);

      const blob = new Blob([wav], { type: 'audio/wav' });
      const sizeKB = (blob.size / 1024).toFixed(1);
      debugInfo.textContent = `Recorded: ${elapsed.toFixed(1)}s · ${sizeKB} KB`;

      micBtn.className = 'mic-btn processing';
      micBtn.innerHTML = '<span class="mic-icon">⏳</span><span class="mic-label">Processing...</span>';
      setStatus('processing', 'Transcribing...');

      const reader = new FileReader();
      reader.onload = async () => {
        const b64 = reader.result.split(',')[1];
        try {
          const res = await fetch('/demo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audio: b64, mime: 'audio/wav', sessionId })
          });
          const data = await res.json();
          if (data.transcript) addMessage('user', data.transcript);
          if (data.reply) {
            addMessage('bot', data.reply);
            if (data.reply_audio) {
              const audio = new Audio('data:audio/mpeg;base64,' + data.reply_audio);
              if (walkieMode) {
                audio.onended = () => { if (walkieMode && !endingWalkie) startRecording(); };
              }
              audio.play().catch(() => {});
            }
          }
          if (data.booking && data.booking.name) {
            bookingCard.style.display = 'block';
            document.getElementById('bRef').textContent = data.booking.refNo || '—';
            document.getElementById('bName').textContent = data.booking.name;
            document.getElementById('bModel').textContent = data.booking.model;
            document.getElementById('bDate').textContent = data.booking.date;
            document.getElementById('bTime').textContent = data.booking.time;
          }
          cleanup();
          if (walkieMode) {
            micBtn.className = 'mic-btn idle';
            micBtn.innerHTML = '<span class="mic-icon">🎤</span><span class="mic-label">Connected — hold to talk</span>';
            setStatus('ready', 'Connected — hold to talk');
          } else {
            refreshUI();
            setStatus('ready', 'Done');
          }
        } catch (err) {
          setStatus('ready', 'Error: ' + err.message);
          if (!walkieMode) {
            micBtn.className = 'mic-btn idle';
            micBtn.innerHTML = '<span class="mic-icon">🎤</span><span class="mic-label">Hold to talk</span>';
            cleanup();
          }
        }
      };
      reader.readAsDataURL(blob);
    }

    function cleanup() {
      if (processor) { processor.disconnect(); processor = null; }
      if (source) { source.disconnect(); source = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      pcmChunks = [];
    }

    function enterWalkie() {
      walkieMode = true;
      endingWalkie = false;
      setStatus('ready', 'Connected — hold to talk');
      micBtn.className = 'mic-btn idle';
      micBtn.innerHTML = '<span class="mic-icon">🎤</span><span class="mic-label">Connected — hold to talk</span>';
    }

    function endWalkie() {
      endingWalkie = true;
      walkieMode = false;
      recording = false;
      cleanup();
      refreshUI();
      setStatus('ready', 'Call ended');
    }

    function refreshUI() {
      micBtn.className = 'mic-btn idle';
      micBtn.innerHTML = '<span class="mic-icon">🎤</span><span class="mic-label">Hold to talk</span>';
    }

    function handlePress() {
      holdTimer = setTimeout(() => {
        holdTimer = null;
        startRecording();
      }, 250);
    }

    function handleRelease() {
      if (holdTimer) {
        clearTimeout(holdTimer);
        holdTimer = null;
        if (walkieMode) endWalkie();
        else enterWalkie();
        return;
      }
      if (!recording) return;
      stopRecording();
    }

    micBtn.addEventListener('mousedown', (e) => { e.preventDefault(); handlePress(); });
    micBtn.addEventListener('mouseup', (e) => { e.preventDefault(); handleRelease(); });
    micBtn.addEventListener('mouseleave', () => { if (recording) stopRecording(); });

    micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handlePress(); });
    micBtn.addEventListener('touchend', (e) => { e.preventDefault(); handleRelease(); });

    setStatus('ready', 'Ready');
  </script>
</body>
</html>
